# Release blusher to RubyGems via Trusted Publishing (OIDC) — no API key stored.
#
# One-time setup on rubygems.org (Gem → Trusted Publishers → GitHub Actions):
#   Repository:  momiji-rs/blusher
#   Workflow:    release.yml
#   Environment: rubygems        (matches `environment:` on the publish job)
# RubyGems then mints a short-lived credential for the OIDC exchange; no secret
# is configured in GitHub.
#
# Push a version tag (e.g. `git tag v0.1.1 && git push --tags`) to build the
# precompiled per-platform gems + a source gem and publish them. A manual
# `workflow_dispatch` run builds the gems WITHOUT publishing (publish is gated
# to tag refs) — use it to validate the cross-compile matrix.
#
# Toolchain note: carmine is edition 2024 (needs Rust >= 1.85) and the lockfile
# is v4, but the rb-sys-dock images bake an older default Rust. There is no
# runtime env var that overrides it, so the cross-gem `setup:` script installs a
# modern toolchain INSIDE the container ($RUST_TARGET is exported by the dock).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@v1
        id: fetch
        with:
          supported-ruby-platforms: |
            exclude: [arm-linux, x64-mingw32]
          stable-ruby-versions: |
            exclude: [head]

  cross-gem:
    name: compile (${{ matrix.platform }})
    needs: ci-data
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v4
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
      - uses: oxidize-rb/cross-gem-action@v7
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.0,3.1,3.2,3.3,3.4"
          # The dock's baked Rust is too old for carmine (edition 2024) and the
          # v4 lockfile; install a modern toolchain in-container before building.
          setup: |
            rustup toolchain install 1.85.0 --profile minimal --no-self-update
            rustup default 1.85.0
            [ -n "$RUST_TARGET" ] && rustup target add "$RUST_TARGET"
            rustc --version
      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*.gem
          if-no-files-found: error

  source-gem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: |
          mkdir -p pkg
          gem build blusher.gemspec -o "pkg/blusher.gem"
      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
          if-no-files-found: error

  publish:
    needs: [cross-gem, source-gem]
    # Only publish on a version tag; a workflow_dispatch run builds-and-validates
    # only. Ship as long as the source gem built — precompiled platform gems are
    # included when present but don't block the release if a target has trouble.
    if: ${{ startsWith(github.ref, 'refs/tags/') && always() && needs.source-gem.result == 'success' }}
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: pkg
          merge-multiple: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      # Exchanges the GitHub OIDC token for short-lived rubygems.org credentials
      # (sets GEM_HOST_API_KEY) via the configured Trusted Publisher.
      - uses: rubygems/configure-rubygems-credentials@v2.1.0
        with:
          trusted-publisher: "true"
      - name: Push all gems
        run: |
          shopt -s nullglob
          for gem in pkg/*.gem; do
            echo "pushing $gem"
            gem push "$gem"
          done
