# Release blusher to RubyGems via Trusted Publishing (OIDC) — no API key stored.
#
# One-time setup on rubygems.org (Gem → Trusted Publishers → GitHub Actions):
#   Repository:  momiji-rs/blusher
#   Workflow:    release.yml
#   Environment: rubygems        (matches `environment:` on the publish job)
#
# Push a version tag (e.g. `git tag v0.1.1 && git push --tags`) to build the
# precompiled per-platform gems + a source fallback and publish them all. A
# manual `workflow_dispatch` run builds the gems WITHOUT publishing (publish is
# gated to tag refs) — use it to validate the cross-compile matrix.
#
# Toolchain note: carmine is edition 2024 (needs Rust >= 1.85) and the lockfile
# is v4, but the rb-sys-dock images bake an older default Rust with no runtime
# env override. The `pre-script` installs a modern toolchain INSIDE the
# container before the build ($RUST_TARGET is exported by the dock).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-gems:
    name: cross gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - aarch64-linux
          - x86_64-linux-musl
          - aarch64-linux-musl
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.1,3.2,3.3,3.4"
          # The dock's baked Rust is too old for carmine (edition 2024) + the v4
          # lockfile; install a modern toolchain in-container before building.
          pre-script: |
            rustup toolchain install 1.85.0 --profile minimal --no-self-update
            rustup default 1.85.0
            [ -n "$RUST_TARGET" ] && rustup target add "$RUST_TARGET"
            rustc --version
      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*-${{ matrix.platform }}.gem
          if-no-files-found: error

  publish:
    name: push to RubyGems (OIDC)
    needs: cross-gems
    # Only publish on a version tag; workflow_dispatch runs build-and-validate only.
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write   # mint a short-lived RubyGems token via OIDC (no secret)
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: actions/download-artifact@v4
        with:
          path: pkg
          pattern: cross-gem-*
          merge-multiple: true
      - name: verify gem version == tag
        run: |
          v=$(ruby -Ilib -r blusher/version -e 'print Blusher::VERSION')
          if [ "v${v}" != "${GITHUB_REF_NAME}" ]; then
            echo "lib/blusher/version.rb (${v}) != tag (${GITHUB_REF_NAME})"; exit 1
          fi
      - name: build source-compile fallback gem
        run: gem build blusher.gemspec -o "pkg/blusher.gem"
      # OIDC token exchange — no GEM_HOST_API_KEY secret.
      - uses: rubygems/configure-rubygems-credentials@v2.1.0
        with:
          trusted-publisher: "true"
      - name: gem push (precompiled platforms, then source fallback)
        run: |
          shopt -s nullglob
          for g in pkg/blusher-*-*.gem; do echo "pushing $g"; gem push "$g"; done
          echo "pushing pkg/blusher.gem"; gem push "pkg/blusher.gem"
