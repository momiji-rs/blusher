# Release blusher to RubyGems via Trusted Publishing (OIDC) — no API key stored.
#
# One-time setup on rubygems.org (Gem → Trusted Publishers → GitHub Actions):
#   Repository:  momiji-rs/blusher
#   Workflow:    release.yml
#   Environment: rubygems        (matches `environment:` on the publish job)
# RubyGems then mints a short-lived credential for the OIDC token below; no
# secret is configured in GitHub.
#
# Triggered by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# Cross-compiles precompiled native gems for the common platforms (so users
# `gem install blusher` without a Rust toolchain), plus a source gem fallback,
# then publishes every artifact.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@v1
        id: fetch
        with:
          supported-ruby-platforms: |
            exclude: [arm-linux, x64-mingw32]
          stable-ruby-versions: |
            exclude: [head]

  cross-gem:
    name: compile (${{ matrix.platform }})
    needs: ci-data
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v4
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
      - uses: oxidize-rb/cross-gem-action@v7
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.0,3.1,3.2,3.3,3.4"
          # carmine is edition 2024 (needs Rust >= 1.85) and the lockfile is v4;
          # force a modern toolchain inside the rb-sys-dock container, whose
          # default is too old to understand either.
          env: |
            RUST_TOOLCHAIN=1.85.0
      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*.gem
          if-no-files-found: error

  source-gem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: |
          mkdir -p pkg
          gem build blusher.gemspec -o "pkg/blusher.gem"
      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
          if-no-files-found: error

  publish:
    needs: [cross-gem, source-gem]
    # Ship as long as the source gem built — it installs everywhere via extconf.
    # Precompiled platform gems are an optimization; don't block the release if
    # a cross-compile target has trouble (they just won't be in this version).
    if: ${{ always() && needs.source-gem.result == 'success' }}
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: pkg
          merge-multiple: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      # Exchanges the GitHub OIDC token for a short-lived RubyGems credential.
      - uses: rubygems/configure-trusted-publisher@v1
      - name: Push all gems
        run: |
          shopt -s nullglob
          for gem in pkg/*.gem; do
            echo "pushing $gem"
            gem push "$gem"
          done
