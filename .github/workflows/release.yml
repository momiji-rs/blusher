# Release blusher to RubyGems via Trusted Publishing (OIDC) — no API key stored.
#
# One-time setup on rubygems.org (Gem → Trusted Publishers → GitHub Actions):
#   Repository:  momiji-rs/blusher
#   Workflow:    release.yml
#   Environment: rubygems        (matches `environment:` on the publish job)
# RubyGems then mints a short-lived credential for the OIDC token below; no
# secret is configured in GitHub.
#
# Triggered by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# Builds the source gem and publishes it via Trusted Publishing. (Precompiled
# per-platform gems are a planned follow-up — see the note above the jobs.)
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# NOTE: v0.1.0 ships SOURCE-ONLY — the gem compiles its rb-sys extension at
# install time (against the published carmine crate; needs a Rust toolchain).
# Precompiled per-platform gems via oxidize-rb/cross-gem-action are a planned
# follow-up: the rb-sys-dock images' default Cargo is older than carmine's
# edition-2024 requirement (and can't parse the v4 lockfile), so cross-compiling
# needs a dock image pinned to modern Rust first.
jobs:
  source-gem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: |
          mkdir -p pkg
          gem build blusher.gemspec -o "pkg/blusher.gem"
      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
          if-no-files-found: error

  publish:
    needs: source-gem
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: pkg
          merge-multiple: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      # Exchanges the GitHub OIDC token for short-lived rubygems.org credentials
      # (sets GEM_HOST_API_KEY) via the configured Trusted Publisher.
      - uses: rubygems/configure-rubygems-credentials@v2.1.0
        with:
          trusted-publisher: "true"
      - name: Push all gems
        run: |
          shopt -s nullglob
          for gem in pkg/*.gem; do
            echo "pushing $gem"
            gem push "$gem"
          done
